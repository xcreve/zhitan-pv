name: ci-quality-gates

on:
  pull_request:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-review:
    # PR 级依赖变更准入；fork/私有仓库设置不满足时可能无法执行
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    continue-on-error: true
    steps:
      - name: Dependency Review (non-blocking)
        uses: actions/dependency-review-action@v4

  spotbugs:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"
          cache: maven

      - name: Run SpotBugs (non-blocking)
        run: |
          mvn -DskipTests -Denforcer.skip=true clean package com.github.spotbugs:spotbugs-maven-plugin:4.8.6.6:spotbugs

      - name: Upload SpotBugs reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-report
          path: |
            **/target/spotbugsXml.xml
            **/target/spotbugs.html
