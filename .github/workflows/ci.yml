name: ci

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**.md'

jobs:
  backend:
    name: Backend (mvn compile)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Maven compile
        run: mvn -B -DskipTests clean compile

  frontend:
    name: Frontend (vue-tsc + vite build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ruoyi-ui/package-lock.json

      - name: Install dependencies
        working-directory: ruoyi-ui
        run: npm ci

      - name: Build (含 vue-tsc 类型检查)
        working-directory: ruoyi-ui
        run: npm run build:strict
