# 生产环境 ZhiTan 覆盖配置
server:
  port: 9050
  servlet:
    context-path: /

spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driverClassName: com.mysql.cj.jdbc.Driver
    druid:
      master:
        url: jdbc:mysql://127.0.0.1:7373/pv_admin?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8
        username: ${DB_USERNAME}
        password: ${DB_PASSWORD}
      slave:
        enabled: false
        url:
        username:
        password:
      initialSize: 5
      minIdle: 10
      maxActive: 20
      maxWait: 60000
      connectTimeout: 30000
      socketTimeout: 60000
      timeBetweenEvictionRunsMillis: 60000
      minEvictableIdleTimeMillis: 300000
      maxEvictableIdleTimeMillis: 900000
      validationQuery: SELECT 1 FROM DUAL
      testWhileIdle: true
      testOnBorrow: false
      testOnReturn: false
      webStatFilter:
        enabled: true
      statViewServlet:
        enabled: true
        allow:
        url-pattern: /druid/*
        login-username: ruoyi
        login-password: 123456
      filter:
        stat:
          enabled: true
          log-slow-sql: true
          slow-sql-millis: 1000
          merge-sql: true
        wall:
          config:
            multi-statement-allow: true

influxdb:
  host: http://127.0.0.1:8086
  token: ${INFLUXDB_TOKEN}
  org: pv
  bucket: pvdata
  measurement: pv

wx:
  appid: ${WX_APPID}
  secret: ${WX_SECRET}
  token: ${WX_TOKEN}
  encodingAesKey: ${WX_ENCODING_AES_KEY}
  page: ${WX_PAGE}
  template_id: ${WX_TEMPLATE_ID}
  env_version: ${WX_ENV_VERSION:release}

alarm:
  offline: 1

# token 配置（生产环境强制要求 JWT_SECRET 环境变量）
token:
  secret: ${JWT_SECRET}
